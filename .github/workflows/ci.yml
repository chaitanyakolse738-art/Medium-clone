name: CI

on:
 push:
  branches:
    - master
  
jobs:
  
  build_deploy:
   
   runs-on: ubuntu-latest

   steps:
     - name: checkout code
       uses: actions/checkout@v4

     - name: setup node
       uses: actions/setup-node@v4
       with:
        node-version: 20
        cache: npm
        cache-dependency-path: ./client/package-lock.json
        

     - name: dependency install
       run: npm ci 
       working-directory: client
       
    

        
         




